<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index
      var base = '/PulseOn';
      var path = window.location.pathname;
      // Strip the base prefix to get the route
      var route = path.startsWith(base) ? path.slice(base.length) || '/' : path;
      sessionStorage.setItem('spa_redirect', route + window.location.search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
